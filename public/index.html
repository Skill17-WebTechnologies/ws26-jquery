<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WSC2026 · jQuery 4.0.0</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1020; color: #e7ecff; }
      .card { background: #151c33; padding: 2.5rem 3rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
      .v { color: #0769ad; }
      button { font-size: 1rem; padding: .6rem 1.2rem; border-radius: 8px; border: 0; background: #0769ad; color: #fff; font-weight: 600; cursor: pointer; }
      #out { margin-top: 1rem; font-weight: 600; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>jQuery <span class="v" id="ver">…</span></h1>
      <p>WSC2026 Web Technologies — minimal jQuery page.</p>
      <button id="btn">Click to toggle</button>
      <div id="out">Hidden message</div>
    </main>
    <script src="/vendor/jquery/dist/jquery.min.js"></script>
    <script>
      $(function () {
        $('#ver').text($.fn.jquery)
        $('#out').hide()
        $('#btn').on('click', function () { $('#out').slideToggle(150) })
      })
    </script>
  </body>
</html>
